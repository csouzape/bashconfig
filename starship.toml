# ~/.config/starship.toml
# Versão mínima — só o essencial, sem poluir o prompt

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$character
"""

add_newline = false
command_timeout = 1000

[directory]
style = "bold blue"
truncation_length = 3
format = "[$path]($style) "

[git_branch]
style = "bold purple"
format = "[$symbol$branch]($style) "
symbol = " "

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style)) "

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold yellow"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

